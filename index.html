<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nowy Poradnik</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .graphic {
      width: 100%;
      max-width: 800px;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="graphic">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">

      <!-- Water surface -->
      <path d="M0 300 Q100 290 200 300 Q300 310 400 300 Q500 290 600 300 Q700 310 800 300 L800 500 L0 500 Z"
            fill="#f0f0f0" stroke="none"/>

      <!-- Water ripple lines -->
      <path d="M0 310 Q100 302 200 310 Q300 318 400 310 Q500 302 600 310 Q700 318 800 310"
            stroke="#c8c8c8" stroke-width="1" fill="none"/>
      <path d="M0 322 Q120 314 240 322 Q360 330 480 322 Q600 314 720 322 L800 322"
            stroke="#c8c8c8" stroke-width="1" fill="none"/>
      <path d="M0 334 Q80 327 160 334 Q280 341 400 334 Q520 327 640 334 L800 334"
            stroke="#d0d0d0" stroke-width="1" fill="none"/>

      <!-- Hull outer shape -->
      <path d="M120 160 Q130 160 140 162 L600 162 Q640 162 660 180 Q700 220 720 270 Q730 285 720 295 Q710 305 695 300 L105 300 Q90 305 80 295 Q70 285 80 270 Q100 220 110 180 Q120 162 120 160 Z"
            fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

      <!-- Layer 1 - outermost (antifouling) -->
      <path d="M130 172 L590 172 Q628 172 648 188 Q685 226 705 272 Q712 284 704 292 L706 292 Q696 298 682 294 L118 294 Q104 298 96 292 L98 292 Q90 284 97 272 Q117 226 154 188 Q174 172 130 172 Z"
            fill="#ebebeb" stroke="#888" stroke-width="1.2" stroke-dasharray="none"/>

      <!-- Layer 2 -->
      <path d="M142 183 L580 183 Q616 183 635 198 Q669 233 688 274 Q694 284 687 290 L688 290 Q679 295 666 292 L134 292 Q121 295 112 290 L113 290 Q106 284 112 274 Q131 233 165 198 Q184 183 142 183 Z"
            fill="#f5f5f5" stroke="#aaa" stroke-width="1.2"/>

      <!-- Layer 3 - innermost (primer/steel) -->
      <path d="M154 194 L568 194 Q602 194 620 208 Q651 240 668 275 Q673 284 667 289 L668 289 Q660 293 648 290 L152 290 Q140 293 132 289 L133 289 Q127 284 132 275 Q149 240 180 208 Q198 194 154 194 Z"
            fill="white" stroke="#bbb" stroke-width="1"/>

      <!-- Hull steel body fill -->
      <path d="M165 204 L557 204 Q589 204 606 217 Q634 247 650 276 Q654 283 649 288 L152 288 Q147 283 151 276 Q167 247 194 217 Q211 204 165 204 Z"
            fill="#f8f8f8" stroke="#ccc" stroke-width="0.8"/>

      <!-- Deck/top line -->
      <rect x="118" y="155" width="564" height="12" rx="3"
            fill="white" stroke="#1a1a1a" stroke-width="2"/>

      <!-- Keel -->
      <path d="M370 292 L380 292 L390 360 Q392 372 380 378 Q368 378 370 360 Z"
            fill="white" stroke="#1a1a1a" stroke-width="2"/>

      <!-- Bow detail -->
      <path d="M600 162 Q645 162 665 178 Q680 192 685 210"
            fill="none" stroke="#555" stroke-width="1.5"/>

      <!-- Stern detail -->
      <path d="M120 162 Q96 162 88 178 Q74 192 78 210"
            fill="none" stroke="#555" stroke-width="1.5"/>

      <!-- Layer thickness indicators - left side -->
      <line x1="72" y1="172" x2="68" y2="172" stroke="#999" stroke-width="1"/>
      <line x1="72" y1="183" x2="68" y2="183" stroke="#999" stroke-width="1"/>
      <line x1="72" y1="194" x2="68" y2="194" stroke="#999" stroke-width="1"/>
      <line x1="72" y1="204" x2="68" y2="204" stroke="#999" stroke-width="1"/>
      <line x1="70" y1="172" x2="70" y2="204" stroke="#999" stroke-width="1"/>

      <!-- Tick marks on layer indicator -->
      <line x1="67" y1="172" x2="73" y2="172" stroke="#777" stroke-width="1.2"/>
      <line x1="67" y1="183" x2="73" y2="183" stroke="#777" stroke-width="1.2"/>
      <line x1="67" y1="194" x2="73" y2="194" stroke="#777" stroke-width="1.2"/>
      <line x1="67" y1="204" x2="73" y2="204" stroke="#777" stroke-width="1.2"/>

      <!-- Waterline marker -->
      <line x1="60" y1="300" x2="740" y2="300"
            stroke="#aaa" stroke-width="1" stroke-dasharray="8 6"/>

      <!-- Small wave detail elements -->
      <path d="M150 320 Q170 313 190 320 Q210 327 230 320"
            stroke="#bbb" stroke-width="1" fill="none"/>
      <path d="M280 330 Q308 322 335 330 Q362 338 390 330"
            stroke="#bbb" stroke-width="1" fill="none"/>
      <path d="M500 318 Q522 311 544 318 Q566 325 588 318"
            stroke="#bbb" stroke-width="1" fill="none"/>
      <path d="M420 340 Q445 333 470 340 Q495 347 520 340"
            stroke="#ccc" stroke-width="1" fill="none"/>

      <!-- Porthole circles -->
      <circle cx="220" cy="188" r="14" fill="white" stroke="#666" stroke-width="1.5"/>
      <circle cx="220" cy="188" r="9" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
      <circle cx="380" cy="188" r="14" fill="white" stroke="#666" stroke-width="1.5"/>
      <circle cx="380" cy="188" r="9" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
      <circle cx="540" cy="188" r="14" fill="white" stroke="#666" stroke-width="1.5"/>
      <circle cx="540" cy="188" r="9" fill="#f0f0f0" stroke="#999" stroke-width="1"/>

      <!-- Mast -->
      <line x1="400" y1="30" x2="400" y2="160" stroke="#333" stroke-width="2.5"/>
      <!-- Boom -->
      <line x1="400" y1="100" x2="560" y2="155" stroke="#333" stroke-width="1.5"/>
      <!-- Forestay -->
      <line x1="400" y1="35" x2="620" y2="158" stroke="#555" stroke-width="1" stroke-dasharray="4 3"/>
      <!-- Backstay -->
      <line x1="400" y1="35" x2="150" y2="158" stroke="#555" stroke-width="1" stroke-dasharray="4 3"/>
      <!-- Shroud -->
      <line x1="400" y1="55" x2="300" y2="158" stroke="#777" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="400" y1="55" x2="500" y2="158" stroke="#777" stroke-width="1" stroke-dasharray="3 3"/>

      <!-- Masthead -->
      <circle cx="400" cy="30" r="4" fill="#333" stroke="none"/>

    </svg>
  </div>
</body>
</html>
