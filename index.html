<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poradnik Malowania Jachtów</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #eaf0f4;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #1a2e3b;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(150deg, #0b3d52 0%, #186878 55%, #2a9d8f 100%);
      padding: 64px 40px 80px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 48px;
      background: #eaf0f4;
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 14px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    header p {
      font-size: 1.05rem;
      opacity: 0.82;
      max-width: 580px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── Main ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 52px 24px 72px;
    }

    /* ── Viewers grid ── */
    .viewers-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    @media (max-width: 1024px) {
      .viewers-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .viewers-row { grid-template-columns: 1fr; }
    }

    /* ── Viewer card ── */
    .boat-viewer {
      background: #fff;
      border-radius: 16px;
      padding: 20px 20px 24px;
      box-shadow: 0 4px 24px rgba(11, 61, 82, 0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .viewer-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a9d8f;
      align-self: flex-start;
      padding-left: 2px;
    }

    /* ── Image stack ── */
    .image-stack {
      position: relative;
      width: 100%;
      aspect-ratio: 1330 / 870;
      border-radius: 10px;
      overflow: hidden;
      background: #f4f8fa;
    }

    .image-stack img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .image-stack img.visible { opacity: 1; }

    /* v1, v2 – strefa pojawia się bez filtra */
    .image-stack img.visible:not(.img-plain) {
      /* brak filtra – obraz pokazuje się tak jak jest */
    }

    /* v3 – placeholder */
    .viewer-placeholder {
      width: 100%;
      aspect-ratio: 1330 / 870;
      border-radius: 10px;
      border: 2px dashed #b8cdd8;
      background: #f4f8fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8aa8b8;
    }

    .viewer-placeholder svg {
      opacity: 0.4;
    }

    .viewer-placeholder span {
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .buttons button {
      padding: 8px 16px;
      border: 2px solid #2a9d8f;
      background: #fff;
      color: #2a9d8f;
      font-size: 13px;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .buttons button:hover:not(:disabled) { background: #e8f7f5; }
    .buttons button.active { background: #2a9d8f; color: #fff; }

    .buttons button:disabled {
      border-color: #c5d5df;
      color: #b0c4ce;
      cursor: default;
    }
  </style>
</head>
<body>

  <header>
    <h1>Poradnik malowania jachtów</h1>
    <p>Interaktywny przewodnik po strefach kadłuba i odpowiednich systemach malarskich</p>
  </header>

  <main>
    <div class="viewers-row">

      <!-- Viewer 1 -->
      <div class="boat-viewer" id="viewer1">
        <span class="viewer-title">Jacht motorowy</span>
        <div class="image-stack">
          <img id="v1-img-plain"  src="https://i.imgur.com/2JDSPhq.png" alt="żaglówka" class="visible img-plain">
          <img id="v1-img-burta"  src="https://i.imgur.com/FH8XQsU.png" alt="nad linią wody – burta">
          <img id="v1-img-poklad" src="https://i.imgur.com/udjBcSO.png" alt="nad linią wody – pokład">
          <img id="v1-img-dno"    src="https://i.imgur.com/x6tZuiC.png" alt="pod linią wody">
        </div>
        <div class="buttons">
          <button onclick="toggle('v1', 'burta',  this)">nad linią wody burty</button>
          <button onclick="toggle('v1', 'poklad', this)">nad linią wody pokład</button>
          <button onclick="toggle('v1', 'dno',    this)">pod linią wody</button>
        </div>
      </div>

      <!-- Viewer 2 -->
      <div class="boat-viewer" id="viewer2">
        <span class="viewer-title">Jacht żaglowy</span>
        <div class="image-stack">
          <img id="v2-img-plain"  src="https://i.imgur.com/YZvIcxq.png" alt="żaglówka" class="visible img-plain">
          <img id="v2-img-burta"  src="https://i.imgur.com/AwdGlVH.png" alt="nad linią wody – burta">
          <img id="v2-img-poklad" src="https://i.imgur.com/Je1ti97.png" alt="nad linią wody – pokład">
          <img id="v2-img-dno"    src="https://i.imgur.com/bv6kaNx.png" alt="pod linią wody">
        </div>
        <div class="buttons">
          <button onclick="toggle('v2', 'burta',  this)">nad linią wody burty</button>
          <button onclick="toggle('v2', 'poklad', this)">nad linią wody pokład</button>
          <button onclick="toggle('v2', 'dno',    this)">pod linią wody</button>
        </div>
      </div>

      <!-- Viewer 3 — placeholder -->
      <div class="boat-viewer" id="viewer3">
        <span class="viewer-title">Widok 3</span>
        <div class="viewer-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2a9d8f" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M12 8v8M8 12h8"/>
          </svg>
          <span>Grafika zostanie dodana</span>
        </div>
        <div class="buttons">
          <button disabled>nad linią wody burty</button>
          <button disabled>nad linią wody pokład</button>
          <button disabled>pod linią wody</button>
        </div>
      </div>

    </div>
  </main>

  <script>
    const state = {};

    function toggle(viewerId, key, btn) {
      const s = state[viewerId] || { activeKey: null, activeBtn: null };
      const plain = document.getElementById(viewerId + '-img-plain');

      if (s.activeKey) {
        document.getElementById(viewerId + '-img-' + s.activeKey).classList.remove('visible');
        if (s.activeBtn) s.activeBtn.classList.remove('active');
      }

      if (s.activeKey === key) {
        // powrót do bazy
        plain.classList.add('visible');
        state[viewerId] = { activeKey: null, activeBtn: null };
      } else {
        // schowaj bazę, pokaż strefę
        plain.classList.remove('visible');
        document.getElementById(viewerId + '-img-' + key).classList.add('visible');
        btn.classList.add('active');
        state[viewerId] = { activeKey: key, activeBtn: btn };
      }
    }
  </script>

</body>
</html>
