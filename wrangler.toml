# Cloudflare Worker — Asystent zakupowy farbyjachtowe.pl

name = "asystent-farbyjachtowe"
main = "worker.js"
compatibility_date = "2024-09-23"

# Cloudflare AI Search (beta) — zarządzany RAG, crawluje farbyjachtowe.pl
# Utwórz przed wdrożeniem: wrangler ai-search create
#   → Name: farbyjachtowe
#   → Source: website
#   → URL: https://www.farbyjachtowe.pl
[[ai_search]]
binding = "SEARCH"
instance_name = "farbyjachtowe"

# ─── SEKRET ────────────────────────────────────────────────────────────────────
# Ustaw przez terminal:
#   wrangler secret put ANTHROPIC_API_KEY
#   (klucz z https://console.anthropic.com/settings/keys)
